<!DOCTYPE html>
<html lang="pt" data-bs-theme="{{ session.get('tema', 'claro') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinix Lovelace</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════════
         NAVBAR — minimalista: apenas logo + tema (sem duplicação)
    ═══════════════════════════════════════════════════════════ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='img/logo.png') }}"
                     alt="Combinix Lovelace" class="logo">
                <span>Combinix Lovelace</span>
                <span class="local-mode-badge ms-2" title="Execução local: os dados ficam neste computador">Local</span>
            </a>
            <div class="navbar-nav ms-auto d-flex flex-row align-items-center">
                <a class="nav-link" href="#" id="themeToggleBtn" title="Alternar modo claro/escuro">
                    <i class="fas fa-moon" id="themeIcon"></i>
                    <span id="themeText">Escuro</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-3 page-with-floating">
        {% block content %}{% endblock %}
    </div>

    <!-- Toast de auto-save -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
        <div id="autoSaveToast" class="toast bg-success text-white border-0"
             data-bs-autohide="true" data-bs-delay="2000" role="status" aria-live="polite" aria-atomic="true">
            <div class="toast-body py-2 px-3">
                <i class="fas fa-check-circle me-2"></i>Salvo automaticamente
            </div>
        </div>
    </div>

    <!-- Botão flutuante "Próximo" — sempre visível no canto inferior direito -->
    <a href="#" id="floatingNextBtn" class="floating-next" style="display:none" aria-label="Ir para próximo passo">
        <span id="floatingNextLabel">Próximo</span>
        <i class="fas fa-arrow-right ms-2"></i>
    </a>

    <!-- Input oculto (usado pela página Seleção) -->
    <input type="file" id="importFile" style="display:none;" accept=".json">

    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
    <script>
    // Proteção CSRF transparente para todas as alterações locais.
    // Se o servidor for reiniciado enquanto uma aba antiga continua aberta,
    // renova o token e repete a alteração uma única vez automaticamente.
    (function () {
        var originalFetch = window.fetch.bind(window);
        var meta = document.querySelector('meta[name="csrf-token"]');

        function currentCsrf() {
            return meta ? meta.getAttribute('content') : '';
        }

        function updateCsrf(token) {
            if (token && meta) meta.setAttribute('content', token);
        }

        window.fetch = function(resource, options) {
            options = options || {};
            var method = String(options.method || 'GET').toUpperCase();
            var isMutation = ['POST','PUT','PATCH','DELETE'].indexOf(method) >= 0;
            if (isMutation) {
                options.headers = new Headers(options.headers || {});
                options.headers.set('X-CSRF-Token', currentCsrf());
            }

            return originalFetch(resource, options).then(function(response) {
                if (!isMutation || response.status !== 403 || options.__csrfRetried) {
                    return response;
                }
                return response.clone().json().then(function(data) {
                    if (!data || !data.csrf_refresh || !data.csrf_token) {
                        return response;
                    }
                    updateCsrf(data.csrf_token);
                    options.__csrfRetried = true;
                    options.headers = new Headers(options.headers || {});
                    options.headers.set('X-CSRF-Token', data.csrf_token);
                    return originalFetch(resource, options);
                }).catch(function() {
                    return response;
                });
            });
        };
    })();
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <script>
    function showAutoSave() {
        var el = document.getElementById('autoSaveToast');
        if (el) { new bootstrap.Toast(el).show(); }
    }

    function setTheme(theme) {
        document.documentElement.setAttribute('data-bs-theme', theme);
        localStorage.setItem('tema', theme);
        fetch('/salvar_tema', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ tema: theme })
        }).catch(function () {});
        if (theme === 'escuro') {
            document.getElementById('themeText').textContent = 'Claro';
            document.getElementById('themeIcon').className   = 'fas fa-sun';
        } else {
            document.getElementById('themeText').textContent = 'Escuro';
            document.getElementById('themeIcon').className   = 'fas fa-moon';
        }
    }

    window.triggerImport = function () {
        document.getElementById('importFile').click();
    };

    document.addEventListener('DOMContentLoaded', function () {
        var serverTheme = document.documentElement.getAttribute('data-bs-theme') || 'claro';
        var storedTheme = localStorage.getItem('tema');
        var activeTheme = storedTheme || serverTheme;
        if (activeTheme !== serverTheme) {
            setTheme(activeTheme);
        } else if (activeTheme === 'escuro') {
            document.getElementById('themeText').textContent = 'Claro';
            document.getElementById('themeIcon').className   = 'fas fa-sun';
        }

        document.getElementById('themeToggleBtn').addEventListener('click', function (e) {
            e.preventDefault();
            var current = document.documentElement.getAttribute('data-bs-theme') || 'claro';
            setTheme(current === 'claro' ? 'escuro' : 'claro');
        });

        var importFile = document.getElementById('importFile');
        if (importFile) {
            importFile.addEventListener('change', function () {
                var file = this.files[0];
                if (!file) return;
                var fd = new FormData();
                fd.append('file', file);
                fetch('/import', { method: 'POST', body: fd })
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        alert(data.status === 'sucesso'
                            ? '✅ Importado com sucesso!'
                            : '❌ Erro: ' + data.mensagem);
                        location.reload();
                    })
                    .catch(function () { alert('❌ Erro ao importar'); });
            });
        }

        // ═══════════════════════════════════════════════════════════════════
        // BOTÃO FLUTUANTE "PRÓXIMO" — lógica central de fluxo
        // ═══════════════════════════════════════════════════════════════════
        (function() {
            var btn = document.getElementById('floatingNextBtn');
            var label = document.getElementById('floatingNextLabel');
            if (!btn || !label) return;

            var path = window.location.pathname;

            function setNext(url, text) {
                btn.setAttribute('href', url);
                label.textContent = text;
                btn.style.display = 'inline-flex';
            }
            function hideNext() { btn.style.display = 'none'; }

            function updateFromTab(tabName) {
                var map = {
                    'disciplinas': { url: '/config#tab-professores', text: 'Próximo: Professores' },
                    'professores': { url: '/config#tab-choque',      text: 'Próximo: Conflitos' },
                    'choque':      { url: '/config#tab-avancadas',   text: 'Próximo: Avançadas' },
                    'avancadas':   { url: '/generate',               text: 'Próximo: Gerar Grade' }
                };
                var next = map[tabName];
                if (next) setNext(next.url, next.text);
                else hideNext();

                // Ajustar posição do botão flutuante:
                // abas com barra "Salvar" sticky (disciplinas, professores) → bottom maior
                // abas sem barra (choque, avancadas) → posição padrão (24px)
                var temBarraSalvar = (tabName === 'disciplinas' || tabName === 'professores');
                btn.classList.toggle('no-sticky', !temBarraSalvar);
            }

            // Função para ativar uma aba programaticamente
            function ativarAba(tabName) {
                var link = document.querySelector('.nav-link[data-tab="' + tabName + '"]');
                if (link) {
                    link.click();  // dispara handler de troca de aba (que existe em config.html)
                    // Scroll suave até o topo das abas
                    var nav = document.getElementById('configTabs');
                    if (nav) {
                        setTimeout(function() {
                            nav.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 50);
                    }
                    return true;
                }
                return false;
            }

            if (path === '/' || path === '/index') {
                setNext('/config', 'Próximo: Configurar');
                btn.classList.add('no-sticky');  // index não tem barra Salvar sticky
                btn.addEventListener('click', function(e) {
                    if (Array.isArray(window.disciplinasSelecionadas) && window.disciplinasSelecionadas.length === 0) {
                        e.preventDefault();
                        alert('Selecione pelo menos uma disciplina antes de avançar.');
                        return;
                    }
                    if (typeof window.aguardarSalvamentoSelecoes === 'function') {
                        e.preventDefault();
                        var destino = btn.getAttribute('href');
                        var confirmar = (typeof window.salvarSelecoesAntesDeAvancar === 'function')
                            ? window.salvarSelecoesAntesDeAvancar()
                            : window.aguardarSalvamentoSelecoes();
                        confirmar
                            .then(function () { window.location.href = destino; })
                            .catch(function () { alert('Não foi possível salvar as seleções. Corrija o erro exibido antes de avançar.'); });
                    }
                });
            }
            else if (path === '/config') {
                // Aba atual via hash ou default
                var activeTab = (window.location.hash || '').replace('#tab-', '') || 'disciplinas';
                updateFromTab(activeTab);

                // Ao clicar numa aba, atualizar label/url do botão
                document.querySelectorAll('.nav-link[data-tab]').forEach(function(lnk) {
                    lnk.addEventListener('click', function() {
                        var t = this.getAttribute('data-tab');
                        updateFromTab(t);
                        history.replaceState(null, '', '#tab-' + t);
                    });
                });

                // Ativar aba baseada em hash inicial
                if (window.location.hash) {
                    var wantedTab = window.location.hash.replace('#tab-', '');
                    ativarAba(wantedTab);
                }

                // ── INTERCEPTAR clique no botão flutuante ──────────────────
                // Se destino é outra aba dentro do /config, não recarregar página:
                // simplesmente trocar aba via JS (evita reload e mantém estado).
                btn.addEventListener('click', function(e) {
                    var href = btn.getAttribute('href') || '';
                    if (href.indexOf('/config#tab-') === 0) {
                        e.preventDefault();
                        var proxAba = href.replace('/config#tab-', '');
                        ativarAba(proxAba);
                        history.replaceState(null, '', '#tab-' + proxAba);
                        updateFromTab(proxAba);
                    }
                    if (href === '/generate' && Array.isArray(window.DISCIPLINAS_LIST) && window.DISCIPLINAS_LIST.length === 0) {
                        e.preventDefault();
                        alert('Selecione pelo menos uma disciplina antes de avançar para a geração.');
                    }
                    // Para /generate e outras URLs válidas, deixa o link funcionar normalmente
                });
            }
            else if (path === '/generate' || path === '/resultados') {
                hideNext();  // fim do fluxo
            }
            else {
                hideNext();
            }
        })();
    });
    </script>

    <footer class="app-footer text-center text-muted py-3">
        <small>Combinix Lovelace {{ app_version }} · modo local · dados armazenados neste computador</small>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
